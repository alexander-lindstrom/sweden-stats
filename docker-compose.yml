services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
    depends_on:
      - backend
      - geoserver
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    volumes:
      - ./data:/app/data:ro
    environment:
      - ALLOWED_ORIGINS=https://datamedmera.se
    restart: unless-stopped

  geoserver:
    image: kartoza/geoserver:2.26.0
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./data/geopackage:/opt/geopackage:ro
    env_file:
      - .env.production
    restart: unless-stopped

volumes:
  geoserver_data:
  caddy_data:
